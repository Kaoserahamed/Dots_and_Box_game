plugins {
    id 'java'
    id 'application'
}

group = 'com.makesquare'
version = '1.0.0'
sourceCompatibility = '8'

repositories {
    mavenCentral()
}

application {
    mainClass = 'com.makesquare.Main'
}

jar {
    manifest {
        attributes 'Main-Class': 'com.makesquare.Main'
    }
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

sourceSets {
    main {
        resources {
            srcDirs = ['src/main/resources']
        }
    }
}
